<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter - Project 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin: 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .counter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .counter {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .warning-message {
            color: #dc2626;
            font-size: 12px;
            display: none;
            margin-top: 8px;
        }

        .warning-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #86efac;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Character counter</h1>
        </div>

        <div class="success-message" id="successMessage">
            Message submitted successfully!
        </div>

        <form id="textForm">
            <div class="form-group">
                <label for="message">Enter your message</label>
                <textarea id="message" placeholder="Type your message here (maximum 200 characters)"></textarea>
                <div class="counter-section">
                    <div class="counter">
                        <span id="charCount">0</span> / <span id="maxCount">200</span> characters
                    </div>
                </div>
                <div class="warning-message" id="warningMessage">
                    Character limit reached! Cannot type more.
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
        </form>
    </div>

    <script>
        const textarea = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        const maxCount = document.getElementById('maxCount');
        const warningMessage = document.getElementById('warningMessage');
        const form = document.getElementById('textForm');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        const MAX_CHARACTERS = 200;

        // Update character counter on input
        textarea.addEventListener('input', () => {
            const currentLength = textarea.value.length;
            charCount.textContent = currentLength;

            // If user tries to type more than limit, remove extra characters
            if (currentLength > MAX_CHARACTERS) {
                textarea.value = textarea.value.substring(0, MAX_CHARACTERS);
                charCount.textContent = MAX_CHARACTERS;
                warningMessage.classList.add('show');
            } else {
                warningMessage.classList.remove('show');
            }
        });

        // Handle form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            if (textarea.value.trim() === '') {
                alert('Please enter a message');
                return;
            }

            alert('Submitted');
            successMessage.classList.add('show');

            // Reset form after 2 seconds
            setTimeout(() => {
                form.reset();
                charCount.textContent = '0';
                warningMessage.classList.remove('show');
                successMessage.classList.remove('show');
            }, 2000);
        });
    </script>
</body>
</html>
